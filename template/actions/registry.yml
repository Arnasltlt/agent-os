# Action registry.
# Each entry describes an explicit writable target under actions/<id>/.
#
# Example:
# actions:
#   - id: edit-website
#     name: Edit Website
#     status: active
#     path: actions/edit-website
#     context_id: website
#     target:
#       kind: repository
#       location: /absolute/path/to/repo
#       cwd: /absolute/path/to/repo

actions:
  - id: lint-context
    name: Lint Context
    status: active
    path: actions/lint-context
    instructions: Audit context/ for staleness, inconsistencies, gaps, and missing indexes.
    target:
      kind: filesystem
      location: context/
