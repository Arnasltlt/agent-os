# Context registry.
# Each entry describes a readable source under context/<id>/.
#
# Example:
# context:
#   - id: company
#     name: Company Overview
#     type: folder
#     path: context/company
#     status: active
#     editable: false
#     description: Core business facts and operating context.

context:
  - id: config
    name: Business Configuration
    type: folder
    path: context/_config
    status: active
    stable: true
    editable: false
    description: Stable business identity — company facts, brand voice, guidelines. Treat as constraints.
